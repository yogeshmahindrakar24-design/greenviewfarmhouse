<!DOCTYPE html>
<html lang="en">

<head>

body{

margin:0;

header{

padding:15px 40px;
display:flex;
justify-content:space-between;
}

header h2 a{

}

text-decoration:none;

}

section h2{
    text-align: center;

}

.contact-box{
display:flex;
justify-content: center;
}

.card{

padding:35px;

input,textarea{
width:100%;
padding:12px;

button{

color:white;
padding:12px 20px;

.map{

height:350px;

footer{
